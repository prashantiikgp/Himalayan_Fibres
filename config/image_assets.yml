# =============================================================================
# IMAGE ASSETS CONFIGURATION
# =============================================================================
# This file stores all Google Drive image URLs for email campaigns
#
# HOW TO ADD NEW IMAGES:
# 1. Upload image to Google Drive
# 2. Right-click > Share > "Anyone with the link"
# 3. Copy the share link (e.g., https://drive.google.com/file/d/XXXXX/view)
# 4. Extract the FILE_ID from the URL
# 5. Create the direct URL: https://lh3.googleusercontent.com/d/{FILE_ID}
# 6. Add it below in the appropriate section
#
# LOCAL BACKUP:
# Also save the original image in: assets/images/{category}/
# This helps you track what images you have
# =============================================================================

