      - id: "bishal_woman_hanging_fiber"
        filename: "1678866670664.jpeg"
        description: "Woman hanging extracted nettle fiber to dry. Stretches long dark fiber strands over a line with arm extended. Mountains behind. Beautiful action shot showing drying process."
        shot_type: "action"
        quality: "high — great composition, process + person"
