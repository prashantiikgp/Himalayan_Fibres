      - id: "bishal_woman_carrying_bundles"
        filename: "1678866670688.jpeg"
        description: "Woman in red wrap carrying large dried fiber bundles over both shoulders, walking past stone-roofed house. Backlit, dust/smoke in air. Physical labor of fiber transport."
        shot_type: "action"
        quality: "high — backlit, atmospheric"
        tags: ["artisan", "women", "carrying", "fiber bundles", "village"]
        best_for: ["behind the scenes", "collection stories", "instagram"]

  manual_extraction:
    gdrive_folder: "4. Photos and Media/Bishal Farm Images/Manual Extraction/"
    images:
      - id: "bishal_manual_extraction"
        filename: "IMG20210101102034.jpg"
        description: "Elderly man on cleared hillside in winter, holding freshly extracted fiber strands in both hands. Misty mountain backdrop. Shows manual extraction technique."
