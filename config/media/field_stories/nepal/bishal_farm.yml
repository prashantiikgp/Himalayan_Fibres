# Bishal Farm — Nepal Field Story
# Artisans, farmers, ERB machine deployment, manual extraction
# One of the richest image sources — professional quality artisan photography

location: "Bishal Farm, Nepal"
story: "Key farmer partnership site — where ERB technology was deployed, women artisans trained, and fiber masters program piloted"

sublocations:
  farmer_images:
    gdrive_folder: "4. Photos and Media/Bishal Farm Images/Farmer Images/"
    total_images: 15
    description: "Professional-quality photos of women artisans and farmers at work"
    images:
      - id: "bishal_woman_stripping"
        filename: "1678866670639.jpeg"
        description: "Woman artisan stripping nettle bark on hillside. Red dress, white headband, green stalks. Another woman behind her. Lush mountain greenery."
        shot_type: "action"
        quality: "high — professional, emotional"
        tags: ["artisan", "women", "bark stripping", "traditional", "hillside"]
        best_for: ["blog hero", "sustainability", "women empowerment", "instagram"]

      - id: "bishal_elder_spinning"
        filename: "1678866670700.jpeg"
        description: "Elderly woman on stone wall, smiling warmly, red headscarf, traditional jewelry, holding spindle. Himalayan mountains behind. Joyful, magazine-worthy portrait."
        shot_type: "portrait"
        quality: "excellent — best artisan portrait"
        tags: ["artisan", "women", "spinning", "portrait", "smiling", "mountains"]
        best_for: ["blog hero", "about us", "instagram", "women empowerment", "cover image"]

      - id: "bishal_woman_carrying"
        filename: "1678866670724.jpeg"
        description: "Woman carrying nettle through dense forest. Bundle over shoulder, pushing through vegetation. Dark, moody forest atmosphere."
        shot_type: "action"
        quality: "high — atmospheric"
        tags: ["artisan", "women", "harvest", "forest", "carrying"]
        best_for: ["blog inline", "behind the scenes", "collection stories"]

      - id: "bishal_woman_sitting_fiber"
        filename: "1678866670652.jpeg"
        description: "Woman artisan sitting, holding bundle of green nettle stalks in her lap. Red dress, beaded necklace. Other women working behind on hillside. Moody atmospheric light."
