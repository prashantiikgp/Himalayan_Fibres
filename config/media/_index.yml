# Media Catalog — Master Index
# Single source of truth for all image assets across all channels.
# Mirrors the actual Google Drive structure + Himalayan Fibres product hierarchy.
#
# Usage:
#   1. Need an image? → Find the right category file, search by tags or best_for
#   2. New images added to Drive? → Add entry to the right file
#   3. Already uploaded to Wix? → Check wix_media_id field on the image
#   4. What size for Instagram? → Check _channel_specs.yml
#
# All image paths are relative to this base:
gdrive_base: "/mnt/g/My Drive/1. Media & Marketing"

