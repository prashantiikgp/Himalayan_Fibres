description:
  short: "Raw nettle plant fibre for spinning, blending, or industrial textile production"
  long: |
    Our Himalayan Stinging Nettle Plant Fibre is sourced directly from wild
    nettle plants growing in the pristine Himalayan ecosystem. This raw fibre
    is ideal for spinners who want to create their own custom yarns, or for
    textile manufacturers looking for sustainable, high-quality plant fiber.

    The fibre is hand-harvested and initially processed to remove the outer
    bark, leaving clean, ready-to-spin fibre with excellent strength and
    natural luster.
