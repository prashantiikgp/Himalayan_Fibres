# Collection Stories — Content Strategy
# On-ground collection journeys, farmer partnerships, founding story
# Wix Category ID: 392d35f0-bfa5-4766-8945-6ca27e536303

strategy:
  purpose: "Show the real, on-ground work — collection expeditions, farmer partnerships, fiber masters, and the origin story of Himalayan Fibres"
  audience: "Everyone — builds trust, shows authenticity"
  frequency: "1-2 posts per month (can cover different seasons/regions)"
  tone: "Personal, narrative, inspiring — first-person where possible"

