  - type: heading
    level: 2
    text: "The People Behind Our Fibers"

  - type: paragraph
    text: |
      Every skein of Himalayan Fibres yarn passes through the hands of our
      artisan partners — over 200 women across 75+ villages in Uttarakhand,
      Nepal, and Meghalaya. These artisans are not just our workforce; they
      are the heart of what we do.

      Many of these women had few income opportunities before joining our
      network. Today, they earn fair wages for skilled work — harvesting wild
      nettle, extracting fiber by hand, spinning, and dyeing using traditional
      techniques passed down through generations. Their expertise is
      irreplaceable, and we are committed to ensuring it is valued and
      sustained.

  - type: quote
    text: "Every skein of yarn carries the story of the Himalayas — the hands that crafted it, the mountains where it grew, and the communities it sustains."

  - type: heading
    level: 2
    text: "Sustainability Is Not a Label — It Is How We Operate"

  - type: paragraph
    text: |
      Sustainability at Himalayan Fibres is not a marketing claim. It is the
      only way we know how to work.

      Our raw materials grow wild in the Himalayan mountains — no farming, no
      pesticides, no artificial fertilizers. The nettle and hemp plants
      regenerate naturally, making them among the most renewable fiber sources
      on earth.

