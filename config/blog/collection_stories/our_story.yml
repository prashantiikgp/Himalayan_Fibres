      - "Fair trade partnerships — 100% of value stays in local communities"
      - "Biodegradable packaging for all shipments"

  - type: heading
    level: 2
    text: "Innovation Rooted in Tradition"

  - type: paragraph
    text: |
      While we honour traditional fiber processing techniques, we also invest
      in innovation. Our proprietary ERB decorticator technology allows us to
      process nettle and hemp fibers more efficiently while maintaining the
      quality and integrity that hand-processing delivers.

      This combination of traditional knowledge and modern technology enables
      us to produce our signature Special Stinging Nettle Yarn — nicknamed
      'Himalayan Silk' — with its distinctive silky lustre and soft drape
      that rivals traditional silk at a fraction of the environmental cost.

  - type: heading
    level: 2
    text: "Looking Ahead"

  - type: paragraph
    text: |
      Our journey is just beginning. We are expanding our artisan network,
      developing new fiber blends, and bringing Himalayan fibers to crafters,
      designers, and textile businesses around the world.

      Whether you are a hand-knitter looking for a yarn with a story, a
      fashion designer seeking sustainable luxury materials, or a business
      wanting to offer eco-friendly products — we invite you to be part of
      the Himalayan Fibres story.

  - type: paragraph
    text: |
      Nature's Finest Fibers, Crafted with Care.

