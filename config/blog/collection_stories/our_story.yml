content:
  - type: heading
    level: 2
    text: "From a Vision in the Mountains"

  - type: paragraph
    text: |
      In 2018, what began as a deep fascination with the untapped potential of
      Himalayan plant fibers became Himalayan Fibres — a company built on the
      belief that the world's finest natural fibers grow wild in one of the
      most remote and beautiful landscapes on earth.

      Walking through the villages of Uttarakhand and Nepal, our founder
      Prashant Agrawal saw two things side by side: communities rich in
      traditional knowledge of fiber processing, and wild-growing nettle and
      hemp plants that nobody was turning into value. The gap between these
      two realities became our mission.

  - type: image
    # --- DISPLAY ---
    alt: "Artisans processing nettle fibers in a Nepal village"
