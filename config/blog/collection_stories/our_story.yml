  - type: heading
    level: 2
    text: "What We Do"

  - type: paragraph
    text: |
      Himalayan Fibres transforms wild-harvested plant fibers from the
      Himalayan ecosystem into premium yarns and textiles. We work with
      Himalayan Stinging Nettle, Hemp, and Tibetan Wool — fibers that grow
      naturally without pesticides, fertilizers, or irrigation.

      Our product range spans from raw plant fibers for spinners and
      manufacturers, to hand-spun yarns in natural and dyed colors, to
      curated collections like our Snow White Series that blend nettle's
      silky sheen with wool's warmth.

  - type: list
    style: bullet
    items:
      - "Himalayan Stinging Nettle Yarn — nicknamed 'Himalayan Silk' for its stunning lustre"
      - "Himalayan Hemp Yarn — soft, durable, and gets better with every wash"
      - "Himalayan Woollen Yarn — hand-spun from high-altitude sheep with exceptional warmth"
      - "Curated Collections — Snow White, Burberry, Noor, and Seriry series"

