# Craft & Tips — Content Strategy
# Working with natural Himalayan fibers — techniques and inspiration
# Wix Category ID: 68e1377f-5e2b-48af-977a-c2dae1dc6cfe

strategy:
  purpose: "Help crafters work with our fibers. Reduce 'unknown fiber' hesitation. Drive repeat purchases by showing what's possible."
  audience: "Hand-knitters, weavers, crocheters, textile artists, DIY crafters"
  frequency: "1 post per month"
  tone: "Friendly, practical, encouraging — like a skilled friend sharing tips"

drafts:
