  # DRAFT 3: Nettle vs Hemp vs Wool — Which Fiber for Your Project?
  # ──────────────────────────────────────────────────────────────────
  - id: "fiber_comparison"
    title: "Nettle vs Hemp vs Wool — Which Himalayan Fiber is Right for Your Project?"
    slug: "nettle-vs-hemp-vs-wool-comparison"
    status: "idea"
    brief:
      topic: "Practical comparison guide to help crafters choose the right fiber"
      key_points:
        - "Warmth: Wool > Nettle > Hemp"
        - "Drape: Nettle (silk-like) > Hemp > Wool"
        - "Durability: Hemp > Nettle > Wool"
        - "Care ease: Hemp (machine wash) > Nettle > Wool"
        - "Best for summer: Hemp and nettle (breathable)"
        - "Best for winter: Wool and nettle-wool blends"
        - "Best for luxury: Special nettle yarn (Himalayan Silk)"
