    status: "idea"
    brief:
      topic: "Practical guide for crafters trying nettle yarn for the first time — what to expect, how it differs from wool/cotton"
      key_points:
        - "How nettle yarn feels vs wool, cotton, silk — honest comparison"
        - "Needle size recommendations (4-5mm for thick, 3.5-4.5mm for fine)"
        - "Gauge expectations: 20-22 stitches per 10cm"
        - "It softens with wear and washing — don't judge by first touch"
        - "Best first projects: scarf, cowl, simple shawl"
        - "Common mistakes to avoid"
        - "Washing and care basics"
      word_count: 800
      product_refs: ["natural_nettle_yarn", "special_nettle_yarn"]
    suggested_images:
