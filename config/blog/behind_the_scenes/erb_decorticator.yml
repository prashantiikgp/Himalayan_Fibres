  - type: paragraph
    text: |
      The result is that fiber extraction has always been the single biggest
      constraint on production volume. Even when demand for nettle yarn
      increased, communities could not scale up because the extraction step
      was simply too slow and too labor-intensive.

  - type: heading
    level: 2
    text: "The Solution: ERB Decorticator"

  - type: paragraph
    text: |
      The ERB (Eco Resource Bank) decorticator is a compact, portable fiber
      extraction machine specifically designed for processing bast fibers
      like nettle and hemp in remote, off-grid locations. Unlike industrial
      decorticators used in large-scale agriculture, the ERB is built to be
      transported to mountain villages by hand or mule, operated by farmers
      with minimal training, and powered by small generators or even manual
      cranking in some models.

  - type: paragraph
    text: |
      The machine works by feeding retted bark strips through a series of
      rollers and beaters that mechanically separate the bast fiber from the
      woody core and residual plant matter. What takes an artisan an entire
      day to produce by hand, the ERB can accomplish in one to two hours —
      with consistent quality and significantly less physical strain on the
      operator.

  - type: heading
    level: 2
    text: "How It Works"

  - type: paragraph
    text: |
      The ERB decorticator operates on a straightforward principle. Retted
      and partially dried bark strips are fed into the machine's intake.
      Inside, a rotating drum fitted with blunt blades breaks apart the bark,
      separating fiber from the woody shive. The fiber emerges from one side,
      clean and ready for the next processing step, while the broken woody
      material drops out below and can be composted or used as mulch.

  - type: paragraph
    text: |
      The key engineering challenge was calibrating the machine's
      aggressiveness. Too harsh, and the fibers are damaged — broken,
      shortened, or weakened. Too gentle, and the separation is incomplete.
      The ERB strikes the right balance, producing fiber that matches or
      exceeds the quality of hand-extracted material, with consistent length
      and minimal breakage.

