  - type: heading
    level: 2
    text: "The Bigger Picture"

  - type: paragraph
    text: |
      The ERB decorticator represents something larger than a single piece
      of equipment. It represents our philosophy at Himalayan Fibres: that
      the best innovations are those that serve people and tradition, not
      replace them. Technology should make ancient crafts more viable in the
      modern economy, not obsolete.

  - type: paragraph
    text: |
      When a farmer in a remote Gorkha village can earn a fair income from
      nettle fiber because a simple machine removed the hardest part of the
      work, that is innovation doing what it should do. That is progress we
      can be proud of.

