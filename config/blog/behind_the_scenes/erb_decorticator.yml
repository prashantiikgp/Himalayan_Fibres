content:
  - type: paragraph
    text: |
      For centuries, extracting fiber from Himalayan nettle and hemp plants
      has been one of the most physically demanding tasks in mountain
      agriculture. The process of stripping bark, beating stalks, and
      separating fibers by hand is slow, painful, and exhausting. A single
      artisan working a full day might produce just one to two kilograms of
      raw fiber.

  - type: paragraph
    text: |
      That bottleneck limited everything downstream: how much yarn
      communities could produce, how much income artisans could earn, and
      how much demand we could meet from buyers seeking sustainable natural
      fibers. We knew there had to be a better way — one that preserved the
      quality and character of handcrafted fiber while dramatically improving
      the speed and comfort of extraction.

  - type: paragraph
    text: "The answer was the ERB decorticator."

  - type: heading
    level: 2
    text: "The Problem: Manual Extraction Is a Bottleneck"

  - type: paragraph
    text: |
      To understand why the ERB decorticator matters, you need to understand
      the traditional fiber extraction process. After nettle stalks are
      harvested and the bark is stripped by hand, artisans must separate the
      usable bast fibers from the woody core and the gummy plant substances
      that bind everything together.

  - type: paragraph
    text: |
      Traditionally, this means hours of beating retted bark against stones,
      scraping with crude tools, and pulling fibers apart strand by strand.
      The work is rough on the hands — nettle's residual stinging compounds
      cause irritation even after retting — and the repetitive motions take
      a toll on the body over time. Many artisans, especially older women,
      develop chronic pain in their hands and shoulders from years of manual
      extraction.

  - type: image
    # --- DISPLAY ---
    alt: "Woman artisan stripping nettle bark on a green hillside in traditional red dress"
    caption: null                       # optional — e.g. "Stripping nettle bark by hand — the step before the ERB takes over."
