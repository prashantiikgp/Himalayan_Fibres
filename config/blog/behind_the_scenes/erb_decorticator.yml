  - type: heading
    level: 2
    text: "Impact on Farming Communities"

  - type: paragraph
    text: |
      The numbers tell a compelling story. With the ERB decorticator,
      extraction throughput increases five to ten times compared to manual
      methods. A farmer who previously produced one to two kilograms of
      fiber per day can now produce five to ten kilograms with less physical
      effort.

  - type: paragraph
    text: |
      This translates directly into higher incomes. More fiber per day means
      more yarn per season, more product to sell, and better livelihoods for
      families. In communities where we have deployed ERB units, we have
      seen:

  - type: list
    style: bullet
    items:
      - "Farmer incomes from fiber processing increasing by three to five times"
      - "Fiber quality becoming more consistent, reducing rejections and waste"
      - "Younger community members becoming more interested in fiber work, seeing it as viable income rather than drudgery"
      - "Reduced physical strain, especially for older artisans who can now participate without chronic pain"

  - type: heading
    level: 2
    text: "Technology That Augments Tradition"

  - type: paragraph
    text: |
      A question we hear often is: does the machine replace artisans? The
      answer is an emphatic no. The ERB decorticator handles only one stage
      of the 12-step fiber processing journey — the most physically
      demanding and least skill-intensive stage. Everything else — the
      careful harvesting, the expert bark stripping, the artful spinning,
      the traditional dyeing — remains entirely in the hands of our artisans.

  - type: paragraph
    text: |
      In fact, by removing the extraction bottleneck, the ERB creates more
      work for spinners and dyers, not less. More raw fiber flowing through
      the system means more demand for the high-skill stages where artisan
      expertise is irreplaceable. The machine does the heavy lifting; the
      artisans do the fine work. It is a partnership, not a replacement.

  - type: heading
    level: 2
    text: "Deployed Across Nepal and Uttarakhand"

  - type: paragraph
    text: |
      Himalayan Fibres has deployed ERB decorticator units in remote
      communities across the Gorkha district of Nepal and the hill regions
      of Uttarakhand in India. Each unit serves a cluster of villages, with
      farmers bringing their retted bark to a central processing point. The
      machines are maintained by trained local operators, creating
      additional skilled employment in these communities.

  - type: paragraph
    text: |
      We are actively planning additional deployments in Meghalaya and other
      Northeast Indian states where wild nettle grows abundantly but fiber
      processing has been limited by the same extraction bottleneck. Our
      goal is to make the ERB decorticator available to every community in
      our network, ensuring that geography and physical limitation are no
      longer barriers to participating in the sustainable fiber economy.

