  - type: heading
    level: 3
    text: "Step 8: Degumming"

  - type: paragraph
    text: |
      For finer yarn grades, the dried fiber undergoes an additional
      degumming process. The fiber is simmered in an alkaline solution —
      traditionally wood ash water, or in modern processing, a mild soda
      ash bath — to dissolve remaining lignin and pectin. This softens the
      fiber dramatically, transforming it from a coarse, rope-like texture
      to something approaching the hand-feel of silk. The degummed fiber
      is rinsed again and dried.

  - type: heading
    level: 3
    text: "Step 9: Carding and Combing"

  - type: paragraph
    text: |
      The clean, dry fibers are carded — brushed and aligned using hand
      carders or drum carders — to create a uniform roving. Carding
      untangles the fibers, removes any remaining short or broken strands,
      and aligns them in parallel for smooth, even spinning. For premium
      yarns, the fiber is also combed to remove shorter fibers and create
      an even more refined, lustrous preparation.

  - type: heading
    level: 2
    text: "Phase 4: Finish (Steps 10–12)"

  - type: heading
    level: 3
    text: "Step 10: Spinning"

  - type: paragraph
    text: |
      This is where the magic happens. The prepared roving is spun into
      yarn using traditional drop spindles, charkhas (spinning wheels), or
      in some cases, small-scale spinning machines. Most of our nettle
      yarn is handspun — each artisan develops their own rhythm and
      tension, giving handspun yarn its characteristic warmth and slight
      irregularity that machine-spun yarns simply cannot replicate.
      Spinning is the most skilled stage of the entire process, and our
      best spinners can produce remarkably fine, consistent yarn.

