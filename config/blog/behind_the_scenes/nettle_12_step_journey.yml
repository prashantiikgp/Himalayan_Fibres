  - type: heading
    level: 2
    text: "Phase 3: Process (Steps 6–9)"

  - type: heading
    level: 3
    text: "Step 6: Washing"

  - type: paragraph
    text: |
      The extracted fibers are thoroughly washed in clean mountain water to
      remove residual plant matter, retting byproducts, and any remaining
      stinging compounds. Multiple rinses ensure the fiber is clean, soft,
      and safe to handle with bare hands. At this point, the sting is
      completely gone.

  - type: heading
    level: 3
    text: "Step 7: Drying"

  - type: paragraph
    text: |
      Washed fibers are spread out on rocks, bamboo racks, or rooftops to
      dry in the mountain sun and breeze. Drying typically takes two to
      three days depending on weather conditions. Proper drying is
      essential — fibers that retain moisture can develop mold, while
      over-drying makes them brittle. Experienced artisans know exactly
      when the fiber has reached the perfect moisture content by touch
      alone.

  - type: image
