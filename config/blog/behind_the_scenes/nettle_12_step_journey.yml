  - type: heading
    level: 3
    text: "Step 11: Dyeing"

  - type: paragraph
    text: |
      Spun yarn can be left in its natural color — a beautiful
      golden-to-cream shade — or dyed using natural or low-impact dyes.
      Traditional botanical dyes include walnut husks (brown), turmeric
      (yellow), indigo (blue), and madder root (red). The yarn is
      simmered in dye baths, often with natural mordants like alum to fix
      the color. Each dye bath is slightly different, giving naturally
      dyed yarn beautiful tonal variations.

  - type: heading
    level: 3
    text: "Step 12: Skeining and Quality Check"

  - type: paragraph
    text: |
      The finished yarn is wound into skeins using a niddy-noddy or swift,
      weighed, and subjected to a final quality check. Each skein is
      inspected for consistency, strength, color evenness, and overall
      hand-feel. Skeins that meet our standards are labeled, photographed,
      and prepared for shipping. Those that fall short are set aside for
      reworking or downgraded to a different product grade.

  - type: heading
    level: 2
    text: "The Full Circle"

  - type: paragraph
    text: |
      From a wild stinging plant on a remote Himalayan hillside to a
      finished skein of premium yarn in your hands — this 12-step journey
      takes anywhere from two weeks to two months depending on weather,
      volume, and the specific yarn grade being produced. Every step is
      performed with care, with skill, and with deep respect for the
      plant, the land, and the traditions that make it all possible.

  - type: paragraph
    text: |
      When you hold a skein of Himalayan nettle yarn, you are holding the
      work of many hands, the knowledge of many generations, and the
      spirit of some of the most resilient communities on Earth. That is
      what makes it truly extraordinary.

