content:
  - type: paragraph
    text: |
      A skein of Himalayan nettle yarn is one of the most remarkable
      natural textiles in the world — strong as linen, soft as silk when
      processed well, naturally antibacterial, and entirely sustainable.
      But how does a wild stinging plant growing on a remote Himalayan
      slope become that beautiful, finished yarn?

  - type: paragraph
    text: |
      The answer is a 12-step journey that blends centuries-old handcraft
      traditions with modern innovation. Each step requires skill,
      patience, and deep knowledge of the plant and the land. Here is the
      complete process, from forest floor to finished skein.

  - type: heading
    level: 2
    text: "Phase 1: Harvest (Steps 1–3)"

  - type: heading
    level: 3
    text: "Step 1: Identifying and Selecting Plants"

  - type: paragraph
    text: |
      The journey begins in the wild. Himalayan stinging nettle (Girardinia
      diversifolia) grows naturally at elevations between 1,500 and 3,000
      meters across Nepal, Uttarakhand, and Northeast India. Our
      experienced foragers — most of them women who have been harvesting
      nettle since childhood — trek into the forests and hillsides to
      identify mature plants. They look for thick stalks with
      well-developed bark, typically harvested between October and December
      after the monsoon season when the fibers are strongest.

  - type: heading
    level: 3
    text: "Step 2: Harvesting the Stalks"

  - type: paragraph
    text: |
      Harvesting nettle is not for the faint-hearted. The plant's leaves
      and stems are covered in stinging hairs that cause intense irritation
      on contact. Artisans wear minimal protective gear — often just their
      experienced hands and traditional techniques — as they cut the
      stalks at the base using sickles. The stalks are bundled and carried
      back to the village, often over rugged mountain trails that can take
      hours to traverse.

  - type: heading
    level: 3
    text: "Step 3: Bark Stripping"

  - type: paragraph
    text: |
      Once back in the village, the outer bark is carefully stripped from
      the stalks by hand. This is where the usable fiber lives — in the
      bast layer just beneath the outer skin. Artisans use a combination of
      fingernails, simple tools, and decades of muscle memory to peel long
      ribbons of bark from each stalk. The inner woody core is set aside
      for composting or fuel. A skilled artisan can strip several dozen
      stalks per hour, yielding thin, ribbon-like strips of raw bark.

