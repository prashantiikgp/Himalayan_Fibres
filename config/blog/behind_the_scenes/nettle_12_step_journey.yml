  - type: heading
    level: 2
    text: "Phase 2: Extract (Steps 4–5)"

  - type: heading
    level: 3
    text: "Step 4: Retting"

  - type: paragraph
    text: |
      The stripped bark is soaked in water for several days in a process
      called retting. This controlled microbial decomposition breaks down
      the pectin and gummy substances that bind the fiber to the
      non-fibrous plant material. Artisans monitor the process carefully —
      too little retting leaves the fiber coarse and difficult to work
      with; too much weakens it. The water used is typically from mountain
      streams, and the retted waste is biodegradable.

  - type: heading
    level: 3
    text: "Step 5: Fiber Extraction"

  - type: paragraph
    text: |
      After retting, the softened bark is either beaten and scraped by
      hand to separate the fibers, or processed through our ERB
      decorticator machines. The traditional manual method yields about one
      to two kilograms of raw fiber per day per artisan. The ERB
      decorticator increases this to five to ten kilograms per day while
      maintaining fiber quality. Either way, the result is long, silky
      strands of raw nettle fiber — pale green to golden in color,
      remarkably strong, and ready for the next stage.

