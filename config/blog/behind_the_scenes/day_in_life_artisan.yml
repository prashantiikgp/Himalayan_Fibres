  - type: paragraph
    text: |
      Her work is nettle. Wild stinging nettle, harvested from the slopes
      above the village, stripped by hand, retted in stone pools, beaten
      soft on the patio, and spun on a wheel that has been in her family
      for as long as she can remember.

      Her hands are rough. Nettle stings even after retting, and thirty
      years of repetition have left their mark. She has pain in her
      shoulders she does not mention. She has worries about her children
      she does not share. She has seen neighbours leave the village for
      the city and come back with less than they took.

      The money she earns is small by any outside standard — a few
      thousand rupees a month, sometimes less. But in a village like
      hers, that money pays for school books, for a sack of rice in a
      lean month, for a bus ticket when a grandchild is sick. It is not
      a supplement. It is the margin between staying and leaving.

  - type: heading
    level: 2
    text: "And Yet"

