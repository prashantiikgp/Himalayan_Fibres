  - type: paragraph
    text: |
      You notice the smile first.

      It is quiet. It is not for the camera. It is the kind of smile a
      person wears when the day has already been long, when the hands have
      already ached, and when the mountain has already been climbed twice —
      once up for the nettle, once down with the bundle.

  - type: paragraph
    text: |
      This is a short story about that smile — her face, her home, her
      village, and her work. And the quiet dignity that binds them all.

  - type: heading
    level: 2
    text: "Her Home"

  - type: image
    # --- DISPLAY ---
    alt: "Elder woman in traditional red dress sitting on a stone stairway of an orange mud-brick village home"
    caption: "An elder resting on the stone stairway of her family home — built the same way for generations."
    layout:
      style: "content"
      alignment: "center"
    # --- SOURCE ---
    catalog_ref: "field_stories/nepal/bishal_farm.yml#good_house_1_stairway"
    local_file: "/mnt/g/My Drive/1. Media & Marketing/4. Photos and Media/Bishal Farm Images/Farmer Images/Good Images/House_1_on the stairway.jpg"
    filename: "House_1_on the stairway.jpg"
    description: "Elder woman in pink/red traditional dress sitting on a stone stairway of an orange mud-brick house. Contemplative pose, beautiful natural light. Stairs built from stacked uneven stone slabs."
    shot_type: "portrait + architecture"
    quality: "excellent — editorial"
    tags: ["elder", "woman", "stairway", "home", "contemplative", "village"]
    best_for: ["blog inline", "resilience story", "elder portrait"]
