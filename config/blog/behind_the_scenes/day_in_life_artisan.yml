  - type: paragraph
    text: |
      And yet, when the work is done — when the bundle is tied, when the
      spindle is put down for the afternoon — she folds her palms together
      and offers a simple namaste.

      It is not rehearsed. It is the way she greets a neighbour, a
      stranger, a buyer she will never meet. A gesture that says, in the
      language of the mountains: *I see you. I am still here. And I am
      grateful.*

  - type: paragraph
    text: |
      She is still here because her craft is still alive. Because the
      skein she just finished is going somewhere far away, to be held by
      someone who will never know her name — and because the money for it
      will come back to this village, to this house, to this stairway.

  - type: quote
    text: "Every skein of Himalayan nettle yarn carries that gesture. When you hold it, you hold her day — her climb, her craft, and her quiet namaste."

  - type: paragraph
    text: |
      That is what a simple skein really costs. And that is what it is
      really worth.

