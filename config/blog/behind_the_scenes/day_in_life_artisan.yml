  - type: paragraph
    text: |
      Home is a stone house with a slate roof. The walls have stood for
      generations, repaired every few years with the same mud, the same
      stones, the same hands. The stairway in front is a stack of uneven
      slabs, worn smooth by bare feet.

      In the morning she lights the fire. In the evening she sits on this
      step and watches the mist settle into the valley. Between those two
      moments is her day.

  - type: heading
    level: 2
    text: "Her Village"

  - type: image
    # --- DISPLAY ---
    alt: "A Himalayan village of stone houses on terraced hillsides, surrounded by dense green forest"
    caption: "A Himalayan village — stone houses, terraced fields, and the nettle growing wild on the slopes above."
    layout:
      style: "content"
      alignment: "center"
    # --- SOURCE ---
    catalog_ref: "field_stories/nepal/bishal_farm.yml#good_village_aerial"
    local_file: "/mnt/g/My Drive/1. Media & Marketing/4. Photos and Media/Bishal Farm Images/Farmer Images/Good Images/Village.jpg"
    filename: "Village.jpg"
    description: "Aerial view of a Himalayan village in terraced hillsides. Stone houses with dark roofs, a creek, dense green forest, and cultivated fields."
    shot_type: "landscape — aerial"
    quality: "high"
    tags: ["village", "landscape", "terraced fields", "remote", "himalayan"]
    best_for: ["setting the scene", "collection stories", "behind the scenes hero"]
    # --- PUBLISH STATE ---
    wix_media_id: "b6e546_2f2ac0d6fa2c41b5add530ac9e3263a5~mv2.jpg"
    status: "uploaded"

  - type: paragraph
    text: |
      Her village is high. An hour's walk from the nearest road, three
      hours from the nearest shop, and a full day from the nearest
      hospital. A pocket of terraced fields carved into the hillside
      generations ago. Electricity comes and goes. The monsoon closes the
      trails for weeks at a time. In winter, the wind cuts through the
      stone walls.

      Neighbours here are more than neighbours. They harvest together for
      safety and companionship, strip bark in groups, sing while they
      work. Isolation is a fact of geography, not of spirit.

  - type: heading
    level: 2
    text: "Her Work"

