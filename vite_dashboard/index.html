<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Himalayan Fibres internal ops dashboard" />
    <meta name="color-scheme" content="dark" />
    <title>Himalayan Fibres Dashboard</title>

    <!--
      Browser-not-supported guard (per STANDARDS §6).
      Chrome/Edge/Safari/Firefox last 2 versions are supported.
      Below that, Promise + fetch are missing — fail fast with a readable message
      rather than a white screen of broken React.
    -->
    <script>
      (function () {
        if (
          typeof Promise === "undefined" ||
          typeof fetch === "undefined" ||
          typeof Map === "undefined"
        ) {
          document.documentElement.removeAttribute("class");
          document.body.innerHTML =
            '<div style="font-family:system-ui,sans-serif;padding:48px;max-width:560px;margin:0 auto;text-align:center;color:#1e1e1e;background:#fff;min-height:100vh;">' +
            '<h1 style="font-size:22px;margin-bottom:12px;">Browser not supported</h1>' +
            '<p style="font-size:14px;line-height:1.6;color:#666;">Please update to the latest version of Chrome, Edge, Safari, or Firefox to use this dashboard.</p>' +
            "</div>";
        }
      })();
    </script>
  </head>
  <body class="bg-bg text-text">
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-50 focus:rounded-md focus:bg-primary focus:px-4 focus:py-2 focus:text-primary-foreground"
    >
      Skip to content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
