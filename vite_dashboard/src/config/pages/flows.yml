# Flows page config — Phase 7.8.

page:
  title: "Flows"
  subtitle: "Automated multi-step sequences with operator intervention points"
  how_to_use:
    summary: "Auto-enroll contacts on a tag/lifecycle change and run a multi-step send sequence with operator pause/resume/stop control."
    sections:
      - title: "How a flow runs"
        body: |
          A flow is a list of steps. When a contact's lifecycle
          changes or a configured tag is added, they're enrolled in
          any matching flow automatically. The scheduler tick (once
          a minute) fires the steps with the configured delays.
          Some steps wait for an operator action — e.g. "Mark sample
          shipped" — instead of a timer.
      - title: "Sample Dispatch — the canonical flow"
        body: |
          1. Tag a contact `samples_requested` (in the contact drawer
             Tags tab) → step 0 fires immediately. Within 60 s the
             contact gets a thank-you email and a WhatsApp ack.
          2. The membership parks at status `waiting_event`.
             Prepare the sample physically.
          3. Open the contact drawer → Flows tab → click "Mark sample
             shipped" with tracking_id + courier. Step 1 sends the
             dispatch email + WA template with the real tracking.
          4. Seven days later, step 2 sends the follow-up
             ("How did it feel?"). Membership is `completed`.
      - title: "See per-contact progress"
        body: |
          Click any flow row to see every contact in that flow with
          their current step, when the next send fires, and per-row
          Pause / Resume / Stop actions. Or open a contact's drawer
          → Flows tab to see all their memberships in one place.
      - title: "Pause vs. Stop"
        body: |
          Pause re-arms when you click Resume — useful if samples
          aren't ready and you want to hold communication for a few
          days. Stop is terminal — the membership won't fire any
          more steps and a fresh tag-add starts a new membership.
  landed_phase: 7
  table:
    page_size: 25
  detail:
    members_default_status: "active"
    step_runs_default_status: ""
    members_page_size: 50
  styles:
    step_card_padding: "10px 14px"
