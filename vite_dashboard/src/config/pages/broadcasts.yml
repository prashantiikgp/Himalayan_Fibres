# Broadcasts page config — lands in Phase 3.
# Unifies WA broadcasts, email broadcasts, and history into one tabbed page.

page:
  title: "Broadcasts"
  subtitle: ""  # Phase 6.2 — replaced by how_to_use below.
  how_to_use:
    summary: "Send a templated message to a contact segment, or schedule it."
    sections:
      - title: "Pick the audience"
        body: |
          Pick a segment from the Audience dropdown. The sticky banner at
          the top updates live as you change filters — it tells you how
          many people will actually receive the message after segment
          rules + channel eligibility filters are applied.
      - title: "Pick a template"
        body: |
          Templates are pre-approved message bodies. WhatsApp templates
          come from the WhatsApp Templates page (only APPROVED ones can
          be sent). For email, type the template slug — e.g.
          "b2b_introduction" or "order_confirmation".
      - title: "Send Now vs Schedule"
        body: |
          Send Now fires immediately. WhatsApp sends finish in seconds.
          Email sends queue in the background and you can watch the
          progress bar fill on this page. Schedule (email only for now)
          opens a datetime picker; the scheduler checks every minute and
          fires due broadcasts within ~60s of their target time.
      - title: "History + Performance"
        body: |
          The History tab shows every broadcast that's been sent — both
          WA and Email in one table. Click any row to jump to the
          Performance tab for that broadcast (per-recipient delivery
          status + error messages, paginated).
  landed_phase: 3
  tabs:
    - id: compose
      label: "Compose"
    - id: history
      label: "History"
    - id: performance
      label: "Performance"
  styles:
    sticky_header_height: "60px"
