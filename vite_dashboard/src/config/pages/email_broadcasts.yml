# Email Broadcasts page (Phase 6.3) — channel-locked Compose +
# History + Performance for the Email channel only.

page:
  title: "Email Broadcasts"
  subtitle: ""
  how_to_use:
    summary: "Send a templated email to a contact segment, or schedule it."
    sections:
      - title: "Pick the audience"
        body: |
          Select a segment from the Audience dropdown. The sticky banner
          at the top updates live as you change filters — it tells you
          how many people will actually receive the email after segment
          rules + email eligibility (must have a real email address)
          filter apply.
      - title: "Pick a template"
        body: |
          The dropdown lists active templates from the Email Templates
          page. Picking one fills in the Variables section and the live
          preview to the right. The Subject field is optional and
          overrides the template's default subject when set.
      - title: "Variables"
        body: |
          Per-recipient values (first name, email, company) resolve from
          each contact at send time and are NOT shown here. Other
          variables (CTA copy, dates, IDs) appear as inputs you fill in
          once and apply to every recipient. Required ones are marked.
      - title: "Send Now vs Schedule"
        body: |
          Send Now queues the broadcast in the background and shows a
          progress bar on this page. Schedule opens a datetime picker;
          the scheduler checks every minute and fires due broadcasts
          within ~60s of their target time. Your typed variables are
          persisted on the scheduled campaign so the rendered emails
          match what the live preview showed at compose time. Cancel a
          scheduled broadcast from the History tab while pending.
      - title: "History + Performance"
        body: |
          History shows every email broadcast. Click a row for
          per-recipient delivery status, sent timestamps, and any
          bounce or send-error messages.
  landed_phase: 3
  tabs:
    - id: compose
      label: "Compose"
    - id: history
      label: "History"
    - id: performance
      label: "Performance"
  styles:
    sticky_header_height: "60px"
