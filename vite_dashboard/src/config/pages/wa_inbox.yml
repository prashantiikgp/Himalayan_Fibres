# WhatsApp Inbox config — lands in Phase 2.

page:
  title: "WhatsApp Inbox"
  subtitle: ""
  how_to_use:
    summary: "Active WhatsApp conversations within the 24h window."
    sections:
      - title: "Window-open vs window-closed"
        body: |
          WhatsApp lets you reply with free text only within 24 hours
          of the customer's last inbound message. If the green "Window
          open" pill is showing, you can type a reply directly. If
          you see "Window closed" or "No conversation yet", the
          composer is replaced with a "Send a template" button.
      - title: "Send a template"
        body: |
          Templates re-open the conversation. Click "Send a template"
          → pick a template → fill any variables → Send. After the
          customer replies, the 24h window opens again.
      - title: "Conversation list filters"
        body: |
          Use the search box to find a contact by name or company.
          The unread badge on each row shows messages not yet read.
          Newest activity sorts to the top.
  landed_phase: 2
  panels:
    conversations:
      min_width: 240
      search_placeholder: "Search active chats..."
      new_conversation_button: "+ New conversation"
      new_conversation_dialog_title: "Start a new WhatsApp conversation"
      new_conversation_dialog_help: "Pick a contact who has a WhatsApp number. Only contacts with a wa_id are shown."
      new_conversation_hide_existing_label: "Hide existing conversations"
    chat:
      min_width: 380
      compose_placeholder: "Type a message..."
      window_warning: "WhatsApp's customer service window is closed. Send an approved template to continue."
      new_conv_warning: "No conversation yet. Sending a template will open a 24-hour window and incur a WhatsApp conversation fee (category-dependent)."
    template_sheet:
      title: "Send a template"
      send_button_label: "Send Template"
  styles:
    chat_messages_max_height: "calc(100vh - 260px)"
    composer_padding: "8px 12px"
    bubble_max_width: "78%"
