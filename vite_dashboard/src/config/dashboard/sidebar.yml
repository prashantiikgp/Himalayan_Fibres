# Sidebar nav — channel-grouped (per audit B11 fix).
# Validated by src/schemas/sidebar.ts. navigationEngine consumes this and
# produces React Router routes plus the rendered <NavSidebar>.
#
# `landed_phase` controls <MigrationStatusCard>'s "lands in Phase N" copy
# for routes whose feature has not yet shipped in v2.

sidebar:
  groups:
    - id: top
      label: ""
      items:
        - id: home
          label: "Home"
          icon: "Home"
          landed_phase: 0
          channel: "mixed"
        - id: contacts
          label: "Contacts"
          icon: "Users"
          landed_phase: 1
          channel: "mixed"

    - id: whatsapp
      label: "WhatsApp"
      items:
        - id: wa_inbox
          label: "Inbox"
          icon: "MessageSquare"
          landed_phase: 2
          channel: "whatsapp"
        - id: broadcasts_wa
          label: "Broadcasts"
          icon: "Send"
          path: "/wa-broadcasts"
          landed_phase: 3
          channel: "whatsapp"
        - id: wa_templates
          label: "Templates"
          icon: "FileText"
          landed_phase: 4
          channel: "whatsapp"

    # Audit B11 — split Broadcasts into its two channels under their
    # respective sections so users navigate by intent, not by feature.
    # Both links route to /broadcasts; the channel toggle on Compose
    # is preset by the path's `?channel=...` query param.
    - id: email
      label: "Email"
      items:
        - id: broadcasts_email
          label: "Broadcasts"
          icon: "Mail"
          path: "/email-broadcasts"
          landed_phase: 3
          channel: "email"
        - id: email_templates
          label: "Templates"
          icon: "FileText"
          path: "/email-templates"
          landed_phase: 6
          channel: "email"

    - id: shared
      label: ""
      items:
        - id: flows
          label: "Flows"
          icon: "GitBranch"
          landed_phase: 5
          channel: "mixed"
