{% macro paragraph(body, align='left', size='16px') %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f5;">
  <tr>
    <td align="center">
      <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px;background:#ffffff;">
        <tr>
          <td style="padding:8px 24px;">
            <p style="font-size:{{ size }};color:{{ color_body }};margin:0;text-align:{{ align }};line-height:1.6;font-family:{{ font_stack }};">
              {{ body | safe }}
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
{% endmacro %}
