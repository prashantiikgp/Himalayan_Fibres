{% macro cta_button(label, url, bg=None, text_color=None) %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f5;">
  <tr>
    <td align="center">
      <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px;background:#ffffff;">
        <tr>
          <td align="center" style="padding:16px 24px;">
            <a href="{{ url }}" target="_blank" rel="noopener" style="display:inline-block;background-color:{{ bg or color_button_bg }};color:{{ text_color or color_button_text }};padding:14px 28px;text-decoration:none;border-radius:6px;font-size:16px;font-family:{{ font_stack }};font-weight:bold;">
              {{ label }}
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
{% endmacro %}
