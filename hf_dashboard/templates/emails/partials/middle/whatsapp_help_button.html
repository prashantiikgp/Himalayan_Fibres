{% macro whatsapp_help_button(prompt='Hi Himalayan Fibres — I have a question.') %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f5;">
  <tr>
    <td align="center">
      <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px;background:#ffffff;">
        <tr>
          <td align="center" style="padding:6px 24px 20px;">
            <a href="{{ whatsapp_url }}?text={{ prompt | urlencode }}" target="_blank" rel="noopener" style="display:inline-block;background-color:#25d366;color:#ffffff;padding:10px 16px;text-decoration:none;border-radius:5px;font-size:14px;font-family:{{ font_stack }};">
              💬 Get help on WhatsApp
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
{% endmacro %}
