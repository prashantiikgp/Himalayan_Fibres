{% macro info_card(title, body, icon_emoji='', bg=None, border=None) %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f5;">
  <tr>
    <td align="center">
      <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px;background:#ffffff;">
        <tr>
          <td style="padding:12px 24px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:{{ bg or color_card_bg }};border:1px solid {{ border or color_card_border }};border-radius:8px;">
              <tr>
                <td style="padding:16px 20px;font-family:{{ font_stack }};">
                  <h4 style="font-size:15px;font-weight:700;color:{{ color_accent }};margin:0 0 6px;">
                    {%- if icon_emoji %}{{ icon_emoji }} {% endif -%}
                    {{ title }}
                  </h4>
                  <p style="font-size:14px;color:{{ color_body }};margin:0;line-height:1.5;">
                    {{ body | safe }}
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
{% endmacro %}
