{% macro hero_image(url, alt='', link='') %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f5;">
  <tr>
    <td align="center">
      <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px;background:#ffffff;">
        <tr>
          <td style="padding:12px 24px;">
            {% if link %}
            <a href="{{ link }}" target="_blank" rel="noopener" style="text-decoration:none;">
              <img src="{{ url }}" alt="{{ alt }}" style="display:block;width:100%;max-width:592px;height:auto;border:0;border-radius:6px;">
            </a>
            {% else %}
            <img src="{{ url }}" alt="{{ alt }}" style="display:block;width:100%;max-width:592px;height:auto;border:0;border-radius:6px;">
            {% endif %}
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
{% endmacro %}
