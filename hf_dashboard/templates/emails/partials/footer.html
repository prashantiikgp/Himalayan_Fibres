<tr>
  <td bgcolor="#ffffff" style="padding:0 24px;background-color:#ffffff;">
    <hr style="border:none;border-top:1px solid #eaeaea;margin:14px 0 0;height:1px;color:#eaeaea;">
  </td>
</tr>
<tr>
  <td bgcolor="#ffffff" style="background-color:#ffffff;padding:16px 24px 20px;font-family:{{ font_stack }};font-size:12px;color:{{ color_text }};text-align:center;">
    <p style="margin:6px 0;color:{{ color_text }};">
      <em>📍 Address:</em>
      <em>{{ address }}</em>
    </p>
    <p style="margin:6px 0;color:{{ color_text }};">
      <em>📧 {{ company_email }} | 📞 {{ company_phone }}</em>
    </p>
    <p style="margin:6px 0;">
      <a href="{{ privacy_url }}" style="color:{{ color_text }};margin:0 5px;text-decoration:none;">Privacy Policy</a> |
      <a href="{{ terms_url }}" style="color:{{ color_text }};margin:0 5px;text-decoration:none;">Terms &amp; Conditions</a> |
      <a href="{{ refund_url }}" style="color:{{ color_text }};margin:0 5px;text-decoration:none;">Refund &amp; Cancellation</a>
    </p>
    <p style="margin:10px 0 0;font-style:italic;color:{{ color_text }};">
      To unsubscribe, please
      <a href="mailto:{{ unsubscribe_mailto }}" style="color:#555;">email us</a>
      with subject line <strong>"Unsubscribe"</strong>.
    </p>
    <p style="margin:10px 0 4px;color:{{ color_text }};">{{ copyright_line }}</p>
  </td>
</tr>
