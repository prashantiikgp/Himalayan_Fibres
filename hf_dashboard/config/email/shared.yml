  # ── Layout (Wave 6 standardization) ──────────────────────────────────
  # Single source of truth for the email shell dimensions/look. Surfaced
  # to base.html + partials so a change here re-flows the whole fleet.
  email_width: 768            # outer shell px width (was hardcoded 720)
  content_max_width: 680      # inner content/image column ceiling
  # Optional "card" treatment (premium look). Default OFF so the ~24
  # shell templates stay plain; migrated campaign templates opt in by
  # passing card_variant=True into their render context (Step 2).
