template:
  slug: sample_shipped
  name: "Sample Shipped — Tracking"
  category: sample_flow
  flow: sample
  flow_step: 2
  subject_template: "Your Himalayan Fibres samples are on the way 📦"
  is_active: true
  required_variables:
    - first_name
  optional_variables:
    - fibre_sent
    - courier_name
    - tracking_id
    - tracking_url
    - dispatch_date
    - delivery_eta
  variables:
    - name: fibre_sent
      label: "Fibre sent"
      type: text
      placeholder: "nettle yarn"
      example: "nettle yarn"
      required: false
    - name: courier_name
      label: "Courier"
      type: text
      placeholder: "BlueDart"
      example: "BlueDart"
      required: false
    - name: tracking_id
      label: "Tracking ID"
      type: text
      placeholder: "BD123456789"
      example: "BD123456789"
      required: false
    - name: tracking_url
      label: "Tracking URL"
      type: url
      placeholder: "https://www.bluedart.com/track/BD123456789"
      example: ""
      required: false
    - name: dispatch_date
      label: "Dispatch date"
      type: date
      placeholder: "02-Sep-2026"
      example: "02-Sep-2026"
      required: false
    - name: delivery_eta
      label: "Estimated delivery"
      type: text
      placeholder: "5-10 working days"
      example: "5-10 working days"
      required: false
