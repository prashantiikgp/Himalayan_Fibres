template:
  slug: sample_swatch_preparation
  name: "Sample Flow Step 1 — Swatch Preparation"
  category: sample_flow
  flow: sample
  flow_step: 1
  subject_template: "We're hand-picking your {{ fibre_requested }} swatches, {{ first_name }}"
  is_active: true
  required_variables:
    - first_name
    - fibre_requested
  optional_variables:
    - expected_dispatch_date
    - book_call_link
  variables:
    - name: fibre_requested
      label: "Fibre requested"
      type: text
      placeholder: "nettle yarn"
      example: "nettle yarn"
      required: true
    - name: expected_dispatch_date
      label: "Expected dispatch (human)"
      type: text
      placeholder: "this Friday"
      example: "this Friday"
      required: false
    - name: book_call_link
      label: "Book-a-call link"
      type: url
      placeholder: "https://cal.com/himalayanfibres/intro"
      example: ""
      required: false
